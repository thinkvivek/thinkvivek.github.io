    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 600px;
            margin-top: 50px;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .trade-row {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .btn-remove {
            position: absolute;
            top: -10px;
            right: -10px;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            padding: 0;
            line-height: 1;
            font-size: 12px;
        }

        .results-box {
            background: #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .result-value {
            color: #0d6efd;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card p-4">
            <h1 class="text-center mb-4 fs-2">Stock Average Calculator</h1>

            <div id="trades-container">
                <div class="trade-row" id="trade-1">
                    <h5>Purchase 1</h5>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label small">Units</label>
                            <input type="number" class="form-control qty" placeholder="e.g. 10" oninput="calculate()">
                        </div>
                        <div class="col-6">
                            <label class="form-label small">Price per share</label>
                            <input type="number" class="form-control price" placeholder="e.g. 150.50"
                                oninput="calculate()">
                        </div>
                    </div>
                </div>

                <div class="trade-row" id="trade-2">
                    <h5>Purchase 2</h5>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label small">Units</label>
                            <input type="number" class="form-control qty" placeholder="0" oninput="calculate()">
                        </div>
                        <div class="col-6">
                            <label class="form-label small">Price per share</label>
                            <input type="number" class="form-control price" placeholder="0.00" oninput="calculate()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-2 mb-3">
                <button class="btn btn-outline-primary btn-sm" onclick="addTrade()">+ Add More Trades</button>
            </div>

            <div class="results-box">
                <div class="result-item">
                    <span>Total Units:</span>
                    <span class="result-value" id="total-units">0</span>
                </div>
                <div class="result-item">
                    <span>Total Investment:</span>
                    <span class="result-value" id="total-investment">$ 0.00</span>
                </div>
                <div class="result-item">
                    <span class="h5">Average Price:</span>
                    <span class="result-value h5" id="avg-price">$ 0.00</span>
                </div>
            </div>

            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-danger w-100" onclick="resetAll()">Clear All</button>
            </div>
        </div>
    </div>

    <script>
        let tradeCount = 2;

        function addTrade() {
            tradeCount++;
            const container = document.getElementById('trades-container');
            const div = document.createElement('div');
            div.className = 'trade-row';
            div.id = `trade-${tradeCount}`;
            div.innerHTML = `
            <button class="btn btn-danger btn-remove" onclick="removeTrade(${tradeCount})">×</button>
            <h5>Purchase ${tradeCount}</h5>
            <div class="row g-2">
                <div class="col-6">
                    <label class="form-label small">Units</label>
                    <input type="number" class="form-control qty" placeholder="0" oninput="calculate()">
                </div>
                <div class="col-6">
                    <label class="form-label small">Price per share</label>
                    <input type="number" class="form-control price" placeholder="0.00" oninput="calculate()">
                </div>
            </div>
        `;
            container.appendChild(div);
        }

        function removeTrade(id) {
            const element = document.getElementById(`trade-${id}`);
            element.remove();
            calculate();
        }

        function calculate() {
            const qtys = document.querySelectorAll('.qty');
            const prices = document.querySelectorAll('.price');

            let totalUnits = 0;
            let totalCost = 0;

            for (let i = 0; i < qtys.length; i++) {
                const q = parseFloat(qtys[i].value) || 0;
                const p = parseFloat(prices[i].value) || 0;

                totalUnits += q;
                totalCost += (q * p);
            }

            const avgPrice = totalUnits > 0 ? (totalCost / totalUnits) : 0;

            // Update UI
            document.getElementById('total-units').innerText = totalUnits.toLocaleString();
            document.getElementById('total-investment').innerText = '₹ ' + totalCost.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('avg-price').innerText = '₹ ' + avgPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function resetAll() {
            if (confirm("Are you sure you want to clear all data?")) {
                location.reload();
            }
        }
    </script>

</body>

</html>
